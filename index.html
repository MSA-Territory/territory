<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Territory Card Printer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
    <script src="https://unpkg.com/@protomaps/basemaps@5/dist/basemaps.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="styles.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: #2c3347;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        #toolbar {
            flex-shrink: 0;
            height: 52px;
            background: #1a2236;
            z-index: 900;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        }

        .tool-btn {
            height: 36px;
            padding: 0 16px;
            border-radius: 7px;
            border: 1.5px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .tool-btn:hover  { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); }
        .tool-btn.active { background: #1a6fc4; border-color: #1a6fc4; }
        .tool-btn:disabled { opacity: 0.38; cursor: not-allowed; }
        #printOneBtn { display: none; }
        #kmzFilenameBadge { position: static !important; top: auto !important; left: auto !important; }

        /* Shared dropdown style */
        .drop-wrap { position: relative; height: 36px; }
        .drop-wrap select {
            height: 36px;
            padding: 0 30px 0 12px;
            border-radius: 7px;
            border: 1.5px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        .drop-wrap select option { background: #1a2236; color: #fff; }
        .drop-wrap::after {
            content: '▾';
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            color: #fff;
            pointer-events: none;
            font-size: 12px;
        }

        #card-stage {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
        }

        #territory-card-frame {
            width: min(
                calc(100%),
                calc((100vh - 52px - 32px) * (152.4 / 101.6))
            );
            aspect-ratio: 152.4 / 101.6;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Times New Roman', Times, serif;
            color: #000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            background: #fff;
            overflow: hidden;
        }

        #card-window {
            flex: 1;
            min-height: 0;
            position: relative;
            border-left: 1px solid #000;
            border-right: 1px solid #000;
            overflow: hidden;
        }

        #map {
            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
        }

        #sidePanel {
            position: fixed;
            top: 52px; right: -320px;
            width: 300px;
            height: calc(100% - 52px);
            background: #fff;
            box-shadow: -3px 0 16px rgba(0,0,0,0.18);
            z-index: 850;
            display: flex;
            flex-direction: column;
            transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
        }
        #sidePanel.open { right: 0; }

        #sidePanelHeader {
            padding: 12px 14px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f7f9fc;
            flex-shrink: 0;
        }
        #sidePanelHeader span { font-weight: 700; font-size: 14px; color: #222; }
        #closePanelBtn {
            background: none; border: none; font-size: 18px;
            cursor: pointer; color: #666; line-height: 1; padding: 0 4px;
        }
        #closePanelBtn:hover { color: #222; }

        #panelPrintBar {
            padding: 8px 12px;
            border-bottom: 1px solid #e0e0e0;
            display: none;
            gap: 8px;
            align-items: center;
            background: #eef4ff;
            flex-shrink: 0;
        }
        #panelPrintBar.visible { display: flex; }
        #printSelectedBtn {
            flex: 1; height: 34px;
            background: #1a6fc4; color: #fff;
            border: none; border-radius: 6px;
            font-size: 13px; font-weight: 700; cursor: pointer;
        }
        #printSelectedBtn:hover { background: #155a9e; }
        #selCount { font-size: 12px; color: #555; white-space: nowrap; }

        #selectAllRow {
            padding: 6px 14px;
            border-bottom: 1px solid #eee;
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #444;
            cursor: pointer; background: #fafafa; flex-shrink: 0;
        }
        #selectAllRow input { cursor: pointer; }
        #sidePanelInner { flex: 1; overflow-y: auto; padding: 4px 0; }

        .side-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 14px; cursor: pointer;
            font-size: 13px; border-bottom: 1px solid #f0f0f0;
            transition: background 0.12s;
        }
        .side-item:hover { background: #f0f6ff; }
        .side-item.active { background: #ddeeff; font-weight: 700; }
        .side-item input[type=checkbox] { cursor: pointer; flex-shrink: 0; }
        .side-item-label { flex: 1; }

        #printOverlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .loader-box {
            background: #fff; border-radius: 12px;
            padding: 32px 40px; min-width: 300px;
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #printStatus { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #222; }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 5px; overflow: hidden; }
        #progressFill { height: 100%; background: #1a6fc4; border-radius: 5px; transition: width 0.3s; width: 0%; }

        @media (max-width: 600px) {
            #toolbar { height: 52px; flex-wrap: nowrap; padding: 4px 6px; gap: 4px; }
            .tool-btn { flex: 1; height: 42px; padding: 0; font-size: 18px; gap: 0; justify-content: center; border-radius: 8px; }
            .tool-btn .btn-label { display: none; }
            .drop-wrap { flex: 1; height: 42px; }
            .drop-wrap select { width: 100%; height: 42px; font-size: 11px; padding: 0 18px 0 4px; }
            #kmzFilenameBadge { flex: 0 0 auto; max-width: 80px; font-size: 10px; }
            #card-stage { padding: 4px; }
            #territory-card-frame {
                width: min(calc(100%), calc((100dvh - 52px - 8px) * (152.4 / 101.6)));
            }
            #sidePanel { width: 85vw; right: -86vw; top: 52px; height: calc(100% - 52px); }
            .loader-box { min-width: unset; width: 80vw; padding: 24px 20px; }
        }

        @media (max-width: 380px) {
            .tool-btn { font-size: 16px; }
            .drop-wrap select { font-size: 10px; }
        }
    </style>
</head>
<body>

    <input type="file" id="fileInput" accept=".kmz,.kml" style="display:none;">

    <div id="toolbar">
        <!-- 1. Add KMZ -->
        <button class="tool-btn" onclick="document.getElementById('fileInput').click()" title="Load KMZ / KML">
            📂 <span class="btn-label">Add KMZ</span>
        </button>
        <span id="kmzFilenameBadge" style="display:none; align-items:center; gap:4px; font-size:12px; font-weight:600; color:#7ecf9a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px;"></span>

        <!-- 2. City selector -->
        <div class="drop-wrap" title="Select City">
            <select id="citySelect">
                <optgroup label="── Coast ──">
                    <option value="mombasa" selected>Mombasa</option>
                    <option value="kilifi">Kilifi</option>
                    <option value="malindi">Malindi</option>
                    <option value="watamu">Watamu</option>
                    <option value="voi">Voi</option>
                </optgroup>
                <optgroup label="── Nairobi ──">
                    <option value="nairobi">Nairobi</option>
                    <option value="thika">Thika</option>
                    <option value="kiambu">Kiambu</option>
                    <option value="ruiru">Ruiru</option>
                    <option value="limuru">Limuru</option>
                    <option value="machakos">Machakos</option>
                    <option value="athiriver">Athi River</option>
                </optgroup>
                <optgroup label="── Central ──">
                    <option value="nyeri">Nyeri</option>
                    <option value="muranga">Muranga</option>
                    <option value="nanyuki">Nanyuki</option>
                    <option value="embu">Embu</option>
                    <option value="kerugoya">Kerugoya</option>
                </optgroup>
                <optgroup label="── Rift Valley ──">
                    <option value="nakuru">Nakuru</option>
                    <option value="naivasha">Naivasha</option>
                    <option value="eldoret">Eldoret</option>
                    <option value="kericho">Kericho</option>
                    <option value="kitale">Kitale</option>
                    <option value="narok">Narok</option>
                    <option value="bomet">Bomet</option>
                    <option value="nyahururu">Nyahururu</option>
                </optgroup>
                <optgroup label="── Western ──">
                    <option value="kisumu">Kisumu</option>
                    <option value="kakamega">Kakamega</option>
                    <option value="bungoma">Bungoma</option>
                    <option value="busia">Busia</option>
                    <option value="kisii">Kisii</option>
                    <option value="homabay">Homa Bay</option>
                    <option value="migori">Migori</option>
                    <option value="siaya">Siaya</option>
                </optgroup>
                <optgroup label="── Eastern ──">
                    <option value="meru">Meru</option>
                    <option value="kitui">Kitui</option>
                    <option value="chuka">Chuka</option>
                </optgroup>
            </select>
        </div>

        <!-- 3. Map style -->
        <div class="drop-wrap" title="Map Style">
            <select id="styleSelect">
                <option value="light" selected>☀️ Light</option>
                <option value="grayscale">🩶 Grayscale</option>
                <option value="dark">🌙 Dark</option>
                <option value="white">⬜ White</option>
                <option value="black">⬛ Black</option>
            </select>
        </div>

        <!-- 4. Print this card -->
        <button class="tool-btn" id="printOneBtn" onclick="printActiveCard()" title="Print this card">
            🖨️ <span class="btn-label">Print This</span>
        </button>

        <!-- 5. Print all -->
        <button class="tool-btn" id="printAllBtn" onclick="startBatchPDF()" disabled title="Download all territories as one PDF">
            🖨️ <span class="btn-label">Print All</span>
        </button>

        <!-- 6. See maps -->
        <button class="tool-btn" id="togglePanelBtn" onclick="togglePanel()" title="Territory List">
            ☰ <span class="btn-label">See Maps</span>
        </button>
    </div>

    <div id="card-stage">
        <div id="territory-card-frame">
            <div id="card-window">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <div id="sidePanel">
        <div id="sidePanelHeader">
            <span>Territories</span>
            <button id="closePanelBtn" onclick="togglePanel()">✕</button>
        </div>
        <div id="panelPrintBar">
            <button id="printSelectedBtn" onclick="printSelectedCards()">🖨️ Print Selected</button>
            <span id="selCount">0 selected</span>
        </div>
        <div id="selectAllRow" onclick="toggleSelectAll()">
            <input type="checkbox" id="selectAllChk" onclick="event.stopPropagation(); toggleSelectAll()">
            <span>Select all</span>
        </div>
        <div id="sidePanelInner">
            <div style="padding:24px; text-align:center; color:#888; font-size:13px;">Load a KMZ to begin</div>
        </div>
    </div>

    <div id="printOverlay">
        <div class="loader-box">
            <div id="printStatus">Preparing...</div>
            <div class="progress-bar"><div id="progressFill"></div></div>
        </div>
    </div>

    <script>
        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            const btn   = document.getElementById('togglePanelBtn');
            panel.classList.toggle('open');
            btn.classList.toggle('active');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
